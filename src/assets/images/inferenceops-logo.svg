<svg xmlns="http://www.w3.org/2000/svg" width="720" height="720" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">InferenceOps logo</title>
  <desc id="desc">A geometric logo showing routed inference paths through GPU nodes.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .word{font-family:Montserrat,Arial,sans-serif;font-weight:800;letter-spacing:0;fill:#f8fafc}.sub{font-family:Montserrat,Arial,sans-serif;font-weight:600;letter-spacing:3px;fill:#93c5fd}.line{stroke:url(#edge);stroke-width:18;stroke-linecap:round;fill:none}.chip{fill:#0b1220;stroke:#334155;stroke-width:8}.node{fill:#111827;stroke:url(#green);stroke-width:12}.core{fill:url(#edge)}
    </style>
  </defs>
  <rect width="720" height="720" rx="120" fill="url(#panel)"/>
  <circle cx="590" cy="120" r="105" fill="#2563eb" opacity="0.16"/>
  <circle cx="125" cy="585" r="130" fill="#0ea5e9" opacity="0.11"/>

  <g filter="url(#shadow)">
    <rect x="176" y="138" width="368" height="324" rx="48" class="chip"/>
    <path d="M244 240 C310 198 408 198 476 240" class="line"/>
    <path d="M244 360 C310 402 408 402 476 360" class="line"/>
    <path d="M244 240 L476 360" class="line" opacity="0.9"/>
    <circle cx="244" cy="240" r="42" class="node"/>
    <circle cx="476" cy="240" r="42" class="node"/>
    <circle cx="244" cy="360" r="42" class="node"/>
    <circle cx="476" cy="360" r="42" class="node"/>
    <circle cx="360" cy="300" r="58" class="core"/>
    <rect x="326" y="266" width="68" height="68" rx="14" fill="#0f172a" stroke="#bfdbfe" stroke-width="6"/>
    <path d="M342 300 H378 M360 282 V318" stroke="#bfdbfe" stroke-width="8" stroke-linecap="round"/>
  </g>

  <text x="360" y="560" text-anchor="middle" class="word" font-size="58">InferenceOps</text>
  <text x="360" y="604" text-anchor="middle" class="sub" font-size="20">LLM SERVING LAB</text>
</svg>
